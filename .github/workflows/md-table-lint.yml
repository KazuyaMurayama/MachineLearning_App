name: MD Table Lint

on:
  push:
    paths:
      - '**/*.md'
  pull_request:
    paths:
      - '**/*.md'
  workflow_dispatch: {}

jobs:
  md-table-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Markdown table column counts
        run: python3 .claude/hooks/md_table_check.py --scan . --format github
